<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo · Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --surface: #1a1a1f;
    --border: #2a2a32;
    --accent: #7c6af7;
    --accent-dim: #3d3570;
    --text: #e8e8f0;
    --muted: #6b6b7e;
    --done: #3a3a45;
    --done-text: #5a5a6e;
    --red: #f76a6a;
    --green: #6af7a8;
    --font: 'Inter', system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: .04em;
    color: var(--accent);
  }
  header span { font-size: 12px; color: var(--muted); }

  /* ── Main layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Todo panel ── */
  .todo-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .todo-add {
    display: flex;
    gap: 8px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .todo-add input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    padding: 8px 12px;
    outline: none;
    transition: border-color .15s;
  }
  .todo-add input:focus { border-color: var(--accent); }
  .todo-add input::placeholder { color: var(--muted); }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 14px;
    cursor: pointer;
    transition: opacity .15s;
    white-space: nowrap;
  }
  .btn:hover { opacity: .85; }
  .btn.ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn.ghost:hover { color: var(--text); border-color: var(--muted); }

  .todo-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .todo-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--muted);
    font-size: 13px;
    gap: 6px;
  }
  .todo-empty .icon { font-size: 28px; }

  .todo-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    transition: border-color .15s;
  }
  .todo-item:hover { border-color: var(--accent-dim); }
  .todo-item.done { opacity: .55; }

  .todo-item input[type=checkbox] {
    accent-color: var(--accent);
    width: 16px; height: 16px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .todo-text {
    flex: 1;
    font-size: 14px;
    line-height: 1.4;
    word-break: break-word;
    cursor: pointer;
  }
  .todo-item.done .todo-text {
    text-decoration: line-through;
    color: var(--done-text);
  }

  .todo-text-edit {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--accent);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    outline: none;
    padding: 1px 0;
  }

  .todo-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .icon-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 14px; padding: 3px 5px;
    border-radius: 5px; transition: color .15s, background .15s;
  }
  .icon-btn:hover { color: var(--text); background: var(--border); }
  .icon-btn.del:hover { color: var(--red); }

  .todo-meta {
    font-size: 11px; color: var(--muted); padding: 10px 20px 6px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
  }

  /* ── Chat panel ── */
  .chat-panel {
    width: 380px;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  /* API key row */
  .api-key-row {
    display: flex;
    gap: 6px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    align-items: center;
  }
  .api-key-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 8px;
    outline: none;
  }
  .api-key-row input:focus { border-color: var(--accent); }
  .api-key-row input::placeholder { color: var(--muted); }
  .api-key-row label { font-size: 11px; color: var(--muted); white-space: nowrap; }

  .chat-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .agent-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    flex-shrink: 0;
  }
  .chat-header-label { font-size: 13px; font-weight: 600; }
  .chat-header-sub { font-size: 11px; color: var(--muted); margin-left: auto; }


  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .chat-msg {
    display: flex;
    flex-direction: column;
    gap: 3px;
    max-width: 92%;
  }
  .chat-msg.user { align-self: flex-end; align-items: flex-end; }
  .chat-msg.assistant { align-self: flex-start; align-items: flex-start; }
  .chat-msg.system { align-self: center; align-items: center; max-width: 100%; }

  .chat-bubble {
    font-size: 13px;
    line-height: 1.5;
    padding: 9px 12px;
    border-radius: 12px;
    word-break: break-word;
  }
  .user .chat-bubble {
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .assistant .chat-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }
  .system .chat-bubble {
    background: transparent;
    color: var(--muted);
    font-size: 11px;
    font-style: italic;
  }
  .tool-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--accent-dim);
    color: var(--accent);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 11px;
    font-family: var(--mono);
    margin: 3px 0;
  }

  .chat-input-row {
    display: flex;
    gap: 8px;
    padding: 12px 14px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .chat-input-row textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    resize: none;
    min-height: 38px;
    max-height: 100px;
    line-height: 1.4;
    transition: border-color .15s;
  }
  .chat-input-row textarea:focus { border-color: var(--accent); }
  .chat-input-row textarea::placeholder { color: var(--muted); }

  .send-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    width: 38px;
    height: 38px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity .15s;
    align-self: flex-end;
  }
  .send-btn:hover { opacity: .85; }
  .send-btn:disabled { opacity: .35; cursor: default; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .typing { display: flex; gap: 4px; align-items: center; padding: 6px 4px; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--muted);
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }
</style>
</head>
<body>

<header>
  <h1>✦ Todo · Agent</h1>
  <span>LLM-powered task assistant</span>
</header>

<div class="layout">

  <!-- ── TODO PANEL ── -->
  <div class="todo-panel">
    <div class="todo-add">
      <input id="newTodoInput" type="text" placeholder="Add a new task…" />
      <button class="btn">Add</button>
    </div>
    <div id="todoList" class="todo-list"></div>
    <div class="todo-meta">
      <span id="todoCount">0 tasks</span>
      <button class="btn ghost" style="font-size:11px;padding:4px 10px">Clear done</button>
    </div>
  </div>

  <!-- ── CHAT PANEL ── -->
  <div class="chat-panel">
    <div class="chat-header">
      <div class="agent-dot"></div>
      <span class="chat-header-label">Agent</span>
      <span class="chat-header-sub">Claude-powered</span>
    </div>

    <div class="api-key-row">
      <label>API key</label>
      <input id="apiKeyInput" type="password" placeholder="sk-ant-…" />
    </div>

    <div id="chatMessages" class="chat-messages">
      <div class="chat-msg system">
        <div class="chat-bubble">Enter your Anthropic API key above, then ask me anything about your tasks.</div>
      </div>
    </div>

    <div class="chat-input-row">
      <textarea id="chatInput" placeholder="Ask the agent…" rows="1"></textarea>
      <button class="send-btn" id="sendBtn">↑</button>
    </div>
  </div>

</div>

<script type="module">

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let chatHistory  = [];
let isAgentBusy  = false;
let todoAPI      = {};   // populated from /openapi.json at startup
let TOOLS        = [];   // derived from todoAPI

// ═══════════════════════════════════════════
//  TOOL HELPERS  (same as before)
// ═══════════════════════════════════════════
function def(description, { input, output }, fn) {
  fn._def = { description, input, output };
  return fn;
}

function deriveTools(api) {
  return Object.entries(api)
    .filter(([, fn]) => typeof fn === 'function' && fn._def)
    .map(([name, fn]) => ({
      name,
      description:  fn._def.description,
      input_schema: fn._def.input,   // JSON Schema passthrough
    }));
}

// Minimal required-field check — replaces TypeBox (no external dependency needed)
function checkRequired(schema, obj) {
  return (schema?.required ?? [])
    .filter(k => obj[k] === undefined)
    .map(k => `missing required field: ${k}`);
}

async function executeTool(name, input) {
  const fn = todoAPI[name];
  if (!fn) return { error: `Unknown tool: ${name}` };

  const errors = checkRequired(fn._def.input, input);
  if (errors.length) return { error: "Invalid input", details: errors };

  const result = await fn(input);

  const outErrors = checkRequired(fn._def.output, result);
  if (outErrors.length) console.warn(`[${name}] output mismatch:`, outErrors);

  return result;
}

// ═══════════════════════════════════════════
//  OPENAPI → todoAPI  (runs once on page load)
//
//  Walks every path+method in the OpenAPI spec and builds a def()-wrapped
//  async function that calls the corresponding REST endpoint.
//
//  Mapping rules:
//    operationId          → function name in todoAPI
//    summary              → description for Claude
//    requestBody schema   → input JSON Schema
//    responses[2xx]schema → output JSON Schema
//    path + method        → fetch() call
//
//  Path parameters (e.g. /todos/{todo_id}) are matched against the input
//  object by name, pulled out of the body, and interpolated into the URL.
// ═══════════════════════════════════════════

// Resolve a $ref like "#/components/schemas/Todo" against the spec
function resolveRef(spec, ref) {
  const parts = ref.replace(/^#\//, '').split('/');
  return parts.reduce((obj, key) => obj?.[key], spec);
}

// Recursively resolve all $refs and simplify Pydantic v2 patterns:
//   anyOf: [{type: X}, {type: "null"}]  →  {type: X}  (optional field)
function resolveSchema(spec, schema, depth = 0) {
  if (!schema || depth > 10) return { type: 'object', properties: {} };

  // Resolve top-level $ref
  if (schema.$ref) return resolveSchema(spec, resolveRef(spec, schema.$ref), depth + 1);

  // Pydantic v2 optional: anyOf with a null branch → unwrap the real type
  if (schema.anyOf) {
    const nonNull = schema.anyOf.filter(s => s.type !== 'null' && !s.$ref?.includes('null'));
    if (nonNull.length === 1) return resolveSchema(spec, nonNull[0], depth + 1);
    // Multiple non-null branches — keep as anyOf but resolve each
    return { ...schema, anyOf: schema.anyOf.map(s => resolveSchema(spec, s, depth + 1)) };
  }

  // Recurse into object properties
  if (schema.properties) {
    const resolved = { ...schema, properties: {} };
    for (const [k, v] of Object.entries(schema.properties))
      resolved.properties[k] = resolveSchema(spec, v, depth + 1);
    return resolved;
  }

  // Recurse into array items
  if (schema.type === 'array' && schema.items)
    return { ...schema, items: resolveSchema(spec, schema.items, depth + 1) };

  return schema;
}

// Extract the first 2xx response schema from an operation
function responseSchema(spec, operation) {
  const responses = operation.responses ?? {};
  const code = ['200', '201'].find(c => responses[c]) ?? Object.keys(responses)[0];
  const content = responses[code]?.content?.['application/json'];
  return resolveSchema(spec, content?.schema);
}

// Build a fetch() function for one OpenAPI operation
function buildFetchFn(spec, method, path, operation) {
  // Path parameters (e.g. todo_id from /todos/{todo_id})
  const pathParams = (path.match(/\{(\w+)\}/g) ?? []).map(p => p.slice(1, -1));

  // Resolve the request body schema (may be empty for GET/DELETE)
  const bodySchema = resolveSchema(
    spec,
    operation.requestBody?.content?.['application/json']?.schema ?? null
  );

  // Merge path params into the input schema so Claude knows to supply them
  const inputSchema = {
    type: 'object',
    properties: {
      ...pathParams.reduce((acc, p) => {
        // Find the param definition in operation.parameters if present
        const paramDef = (operation.parameters ?? []).find(x => x.name === p);
        acc[p] = resolveSchema(spec, paramDef?.schema ?? { type: 'integer' });
        acc[p].description = paramDef?.description ?? p;
        return acc;
      }, {}),
      ...(bodySchema?.properties ?? {}),
    },
    required: [
      ...pathParams,
      ...(bodySchema?.required ?? []),
    ],
  };

  const outputSchema = responseSchema(spec, operation);

  const fn = async (input = {}) => {
    let url = path;
    const body = { ...input };
    for (const p of pathParams) {
      if (!(p in body)) throw new Error(`Missing path param: ${p}`);
      url = url.replace(`{${p}}`, encodeURIComponent(body[p]));
      delete body[p];
    }

    const hasBody = ['post', 'patch', 'put'].includes(method);
    const res = await fetch(url, {
      method:  method.toUpperCase(),
      headers: hasBody ? { 'Content-Type': 'application/json' } : {},
      body:    hasBody && Object.keys(body).length ? JSON.stringify(body) : undefined,
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail ?? `HTTP ${res.status}`);
    }
    return res.json();
  };

  return def(operation.summary ?? operation.operationId, { input: inputSchema, output: outputSchema }, fn);
}

async function buildAPIFromSpec(specUrl = '/openapi.json') {
  const spec = await fetch(specUrl).then(r => r.json());
  const api  = {};

  for (const [path, methods] of Object.entries(spec.paths ?? {})) {
    for (const [method, operation] of Object.entries(methods)) {
      if (!operation.operationId) continue;
      api[operation.operationId] = buildFetchFn(spec, method, path, operation);
    }
  }

  return api;
}

// ═══════════════════════════════════════════
//  TODO UI
// ═══════════════════════════════════════════
async function loadTodos() {
  const todos = await todoAPI.list_todos({});
  renderTodos(todos);
}

function renderTodos(todos) {
  const list  = document.getElementById('todoList');
  const count = document.getElementById('todoCount');

  count.textContent = `${todos.length} task${todos.length !== 1 ? 's' : ''}`;

  if (todos.length === 0) {
    list.innerHTML = `
      <div class="todo-empty">
        <div class="icon">✓</div>
        <div>No tasks yet — add one above or ask the agent.</div>
      </div>`;
    return;
  }

  list.innerHTML = todos.map(t => `
    <div class="todo-item${t.done ? ' done' : ''}" id="item-${t.id}" data-id="${t.id}" data-done="${t.done}">
      <input type="checkbox" ${t.done ? 'checked' : ''} data-action="toggle" />
      <span class="todo-text" data-action="edit">${escHtml(t.text)}</span>
      <div class="todo-actions">
        <button class="icon-btn" title="Edit" data-action="edit">✎</button>
        <button class="icon-btn del" title="Delete" data-action="delete">✕</button>
      </div>
    </div>`).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function addTodo() {
  const inp  = document.getElementById('newTodoInput');
  const text = inp.value.trim();
  if (!text) return;
  await todoAPI.add_todo({ text });
  inp.value = '';
  inp.focus();
  await loadTodos();
}

async function clearDone() {
  await todoAPI.clear_done_todos({});
  await loadTodos();
}

function startEdit(id, currentText) {
  const row = document.getElementById(`item-${id}`);
  const span = row.querySelector('.todo-text');
  const inp = document.createElement('input');
  inp.className = 'todo-text-edit';
  inp.value = currentText;
  inp.addEventListener('blur', async () => {
    if (inp.value.trim()) await todoAPI.update_todo({ todo_id: id, text: inp.value });
    await loadTodos();
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') inp.blur();
    if (e.key === 'Escape') { inp.value = currentText; inp.blur(); }
  });
  span.replaceWith(inp);
  inp.focus();
}

// Event delegation for todo list
document.getElementById('todoList').addEventListener('click', async e => {
  const row = e.target.closest('[data-id]');
  if (!row) return;
  const id     = parseInt(row.dataset.id);
  const done   = row.dataset.done === 'true';
  const action = e.target.closest('[data-action]')?.dataset.action;
  const text   = row.querySelector('.todo-text')?.textContent ?? '';

  if (action === 'toggle') {
    await todoAPI.update_todo({ todo_id: id, done: !done });
    await loadTodos();
  } else if (action === 'edit') {
    startEdit(id, text);
  } else if (action === 'delete') {
    await todoAPI.delete_todo({ todo_id: id });
    await loadTodos();
  }
});

// ═══════════════════════════════════════════
//  CHAT UI
// ═══════════════════════════════════════════
function appendMsg(role, content) {
  const box = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `chat-msg ${role}`;
  div.innerHTML = `<div class="chat-bubble">${content}</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function appendToolPill(name, result) {
  const box = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-msg assistant';
  div.innerHTML = `<div class="tool-pill">⚙ ${name} → ${JSON.stringify(result).slice(0,80)}</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function showTyping() {
  const box = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className   = 'chat-msg assistant';
  div.id          = 'typing-indicator';
  div.innerHTML   = `<div class="chat-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function hideTyping() {
  document.getElementById('typing-indicator')?.remove();
}

function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// ═══════════════════════════════════════════
//  AGENT LOOP
// ═══════════════════════════════════════════
const SYSTEM_PROMPT = `You are a helpful task management assistant.
You have tools to list, add, update, and delete todos.
Always call list_todos first when the user asks about their tasks.
Be concise and friendly. Confirm what you did after using tools.`;

async function callClaude(messages) {
  const apiKey = document.getElementById('apiKeyInput').value.trim();
  if (!apiKey) throw new Error("Please enter your Anthropic API key.");

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model:      "claude-sonnet-4-20250514",
      max_tokens: 1024,
      system:     SYSTEM_PROMPT,
      tools:      TOOLS,
      messages,
    }),
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message ?? `API error ${res.status}`);
  }
  return res.json();
}

async function sendMessage() {
  if (isAgentBusy) return;
  const input    = document.getElementById('chatInput');
  const userText = input.value.trim();
  if (!userText) return;

  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  isAgentBusy = true;

  appendMsg('user', escHtml(userText));
  chatHistory.push({ role: 'user', content: userText });
  showTyping();

  try {
    while (true) {
      const data       = await callClaude(chatHistory);
      hideTyping();

      const toolBlocks = data.content.filter(b => b.type === 'tool_use');
      const textBlocks = data.content.filter(b => b.type === 'text');

      for (const b of textBlocks)
        if (b.text.trim()) appendMsg('assistant', escHtml(b.text));

      // Always record the full assistant turn first.
      // The API requires every tool_use block be immediately followed
      // by a user message containing all matching tool_result blocks.
      chatHistory.push({ role: 'assistant', content: data.content });

      if (toolBlocks.length > 0) {
        // Execute ALL tool calls and return results before looping back.
        const toolResults = [];
        for (const tool of toolBlocks) {
          const result = await executeTool(tool.name, tool.input);
          appendToolPill(tool.name, result);
          toolResults.push({ type: 'tool_result', tool_use_id: tool.id, content: JSON.stringify(result) });
        }
        chatHistory.push({ role: 'user', content: toolResults });
        await loadTodos();
        showTyping();
        continue;  // always loop back so Claude can react to results
      }

      // No tool blocks — done when Claude says end_turn
      if (data.stop_reason === 'end_turn') break;

      // Unexpected stop reason with no tool blocks — bail to avoid infinite loop
      console.warn('Unexpected stop_reason:', data.stop_reason);
      break;
    }
  } catch (err) {
    hideTyping();
    appendMsg('system', `⚠ ${err.message}`);
  }

  document.getElementById('sendBtn').disabled = false;
  isAgentBusy = false;
  input.focus();
}

// ═══════════════════════════════════════════
//  INIT — build API from spec, then load todos
// ═══════════════════════════════════════════
async function init() {
  try {
    todoAPI = await buildAPIFromSpec('/openapi.json');
    TOOLS   = deriveTools(todoAPI);
    await loadTodos();
    appendMsg('system', `API ready — ${TOOLS.length} tools loaded from OpenAPI spec.`);
  } catch (e) {
    appendMsg('system', `⚠ Could not reach backend: ${e.message}`);
  }
}

document.getElementById('newTodoInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });
document.querySelector('.todo-add .btn').addEventListener('click', addTodo);
document.querySelector('.todo-meta .btn').addEventListener('click', clearDone);
document.getElementById('sendBtn').addEventListener('click', sendMessage);
document.getElementById('chatInput').addEventListener('keydown', handleChatKey);

init();
</script>
