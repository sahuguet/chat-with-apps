<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker · Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f11; --surface: #1a1a1f; --border: #2a2a32;
    --accent: #7c6af7; --accent-dim: #3d3570;
    --text: #e8e8f0; --muted: #6b6b7e;
    --red: #f76a6a; --green: #6af7a8; --yellow: #f7d06a;
    --font: 'Inter', system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font);
         height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header { display: flex; align-items: center; justify-content: space-between;
           padding: 14px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: .04em; color: var(--accent); }
  header span { font-size: 12px; color: var(--muted); }

  .layout { display: flex; flex: 1; overflow: hidden; }

  /* ── Data panel ── */
  .data-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
  .panel-header { padding: 14px 20px; border-bottom: 1px solid var(--border);
                  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .panel-header h2 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
  .panel-body { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; }
  .panel-footer { padding: 10px 20px; border-top: 1px solid var(--border); flex-shrink: 0;
                  font-size: 12px; color: var(--muted); display: flex; gap: 16px; }
  .panel-footer strong { color: var(--text); }

  .expense-row { display: flex; align-items: center; gap: 10px;
                 background: var(--surface); border: 1px solid var(--border);
                 border-radius: 8px; padding: 10px 14px; }
  .expense-amount { font-size: 15px; font-weight: 600; color: var(--green); font-family: var(--mono);
                    min-width: 72px; text-align: right; flex-shrink: 0; }
  .expense-desc { flex: 1; font-size: 13px; }
  .expense-meta { font-size: 11px; color: var(--muted); text-align: right; flex-shrink: 0; }
  .tag { display: inline-block; background: var(--accent-dim); color: var(--accent);
         border-radius: 4px; padding: 2px 7px; font-size: 11px; font-family: var(--mono); }

  .empty { display: flex; align-items: center; justify-content: center; flex: 1;
           color: var(--muted); font-size: 13px; }

  chat-with-app { flex-shrink: 0; border-left: 1px solid var(--border); }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<header>
  <h1>&#x24; Expense Tracker</h1>
  <span>Track spending with natural language</span>
</header>

<div class="layout">
  <div class="data-panel">
    <div class="panel-header">
      <h2>Expenses</h2>
      <span id="expenseCount" style="font-size:12px;color:var(--muted)"></span>
    </div>
    <div id="expenseList" class="panel-body"></div>
    <div class="panel-footer">
      <span>Total: <strong id="totalAmount">$0.00</strong></span>
    </div>
  </div>

  <chat-with-app
    id="chatAgent"
    spec-url="/openapi.json"
    system-prompt="You are a helpful expense tracking assistant. Help users log expenses, categorize spending, and understand their financial patterns. When asked about spending, always call get_expense_summary or list_expenses first. Be concise and confirm actions taken."
  ></chat-with-app>
</div>

<script type="module" src="/shared/chat-with-app.js"></script>
<script type="module">
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function loadExpenses() {
  const [expenses, summary] = await Promise.all([
    fetch('/expenses').then(r => r.json()),
    fetch('/expenses/summary').then(r => r.json()),
  ]);

  const list  = document.getElementById('expenseList');
  const count = document.getElementById('expenseCount');
  const total = document.getElementById('totalAmount');

  count.textContent = `${expenses.length} expense${expenses.length !== 1 ? 's' : ''}`;
  total.textContent = `$${summary.total.toFixed(2)}`;

  if (expenses.length === 0) {
    list.innerHTML = `<div class="empty">No expenses yet &mdash; ask the agent to add one.</div>`;
    return;
  }

  const sorted = [...expenses].sort((a, b) => b.date.localeCompare(a.date));
  list.innerHTML = sorted.map(e => `
    <div class="expense-row">
      <span class="expense-amount">$${e.amount.toFixed(2)}</span>
      <div style="flex:1">
        <div class="expense-desc">${escHtml(e.description)}</div>
        <div style="margin-top:3px"><span class="tag">${escHtml(e.category)}</span></div>
      </div>
      <div class="expense-meta">${escHtml(e.date)}</div>
    </div>`).join('');
}

document.getElementById('chatAgent').addEventListener('tool-executed', loadExpenses);

loadExpenses();
</script>
</body>
</html>
