<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Box · Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f11; --surface: #1a1a1f; --border: #2a2a32;
    --accent: #7c6af7; --accent-dim: #3d3570;
    --text: #e8e8f0; --muted: #6b6b7e;
    --red: #f76a6a; --green: #6af7a8; --yellow: #f7d06a;
    --font: 'Inter', system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font);
         height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header { display: flex; align-items: center; justify-content: space-between;
           padding: 14px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: .04em; color: var(--accent); }
  header span { font-size: 12px; color: var(--muted); }

  .layout { display: flex; flex: 1; overflow: hidden; }

  .data-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
  .panel-header { padding: 14px 20px; border-bottom: 1px solid var(--border);
                  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .panel-header h2 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
  .panel-body { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; }

  .recipe-card { background: var(--surface); border: 1px solid var(--border);
                 border-radius: 8px; padding: 12px 14px; cursor: pointer;
                 transition: border-color .15s; }
  .recipe-card:hover { border-color: var(--accent-dim); }
  .recipe-card.expanded { border-color: var(--accent-dim); }
  .recipe-name { font-size: 14px; font-weight: 600; }
  .recipe-meta { font-size: 11px; color: var(--muted); margin-top: 4px; display: flex; gap: 10px; align-items: center; }
  .recipe-ingredients { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.5;
                        display: none; border-top: 1px solid var(--border); padding-top: 8px; }
  .recipe-card.expanded .recipe-ingredients { display: block; }
  .tag { display: inline-block; background: var(--accent-dim); color: var(--accent);
         border-radius: 4px; padding: 2px 7px; font-size: 11px; font-family: var(--mono); }
  .empty { display: flex; align-items: center; justify-content: center; flex: 1;
           color: var(--muted); font-size: 13px; }

  chat-with-app { flex-shrink: 0; border-left: 1px solid var(--border); }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<header>
  <h1>&#x1F373; Recipe Box</h1>
  <span>Find recipes by ingredient, plan meals, discover what to cook</span>
</header>

<div class="layout">
  <div class="data-panel">
    <div class="panel-header">
      <h2>Recipes</h2>
      <span id="recipeCount" style="font-size:12px;color:var(--muted)"></span>
    </div>
    <div id="recipeList" class="panel-body"></div>
  </div>

  <chat-with-app
    id="chatAgent"
    spec-url="/openapi.json"
    system-prompt="You are a helpful recipe assistant. Help users manage their recipe collection, find recipes by ingredients available, suggest meal ideas, and plan meals. When asked what to cook with certain ingredients, use search_recipes. Be creative and concise."
  ></chat-with-app>
</div>

<script type="module" src="/shared/chat-with-app.js"></script>
<script type="module">
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function loadRecipes() {
  const recipes = await fetch('/recipes').then(r => r.json());
  const list  = document.getElementById('recipeList');
  const count = document.getElementById('recipeCount');

  count.textContent = `${recipes.length} recipe${recipes.length !== 1 ? 's' : ''}`;

  if (recipes.length === 0) {
    list.innerHTML = `<div class="empty">No recipes yet &mdash; ask the agent to add one.</div>`;
    return;
  }

  list.innerHTML = recipes.map(r => `
    <div class="recipe-card" data-id="${r.id}">
      <div class="recipe-name">${escHtml(r.name)}</div>
      <div class="recipe-meta">
        <span>${r.servings} serving${r.servings !== 1 ? 's' : ''}</span>
        ${r.tags ? r.tags.split(',').map(t => `<span class="tag">${escHtml(t.trim())}</span>`).join('') : ''}
      </div>
      <div class="recipe-ingredients">
        <strong style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;">Ingredients</strong>
        <div style="margin-top:4px">${escHtml(r.ingredients)}</div>
      </div>
    </div>`).join('');

  list.querySelectorAll('.recipe-card').forEach(card => {
    card.addEventListener('click', () => card.classList.toggle('expanded'));
  });
}

document.getElementById('chatAgent').addEventListener('tool-executed', loadRecipes);

loadRecipes();
</script>
</body>
</html>
