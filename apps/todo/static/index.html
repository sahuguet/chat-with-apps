<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo · Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --surface: #1a1a1f;
    --border: #2a2a32;
    --accent: #7c6af7;
    --accent-dim: #3d3570;
    --text: #e8e8f0;
    --muted: #6b6b7e;
    --done: #3a3a45;
    --done-text: #5a5a6e;
    --red: #f76a6a;
    --green: #6af7a8;
    --font: 'Inter', system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: .04em;
    color: var(--accent);
  }
  header span { font-size: 12px; color: var(--muted); }

  /* ── Main layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Todo panel ── */
  .todo-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .todo-add {
    display: flex;
    gap: 8px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .todo-add input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    padding: 8px 12px;
    outline: none;
    transition: border-color .15s;
  }
  .todo-add input:focus { border-color: var(--accent); }
  .todo-add input::placeholder { color: var(--muted); }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 14px;
    cursor: pointer;
    transition: opacity .15s;
    white-space: nowrap;
  }
  .btn:hover { opacity: .85; }
  .btn.ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn.ghost:hover { color: var(--text); border-color: var(--muted); }

  .todo-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .todo-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--muted);
    font-size: 13px;
    gap: 6px;
  }
  .todo-empty .icon { font-size: 28px; }

  .todo-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    transition: border-color .15s;
  }
  .todo-item:hover { border-color: var(--accent-dim); }
  .todo-item.done { opacity: .55; }

  .todo-item input[type=checkbox] {
    accent-color: var(--accent);
    width: 16px; height: 16px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .todo-text {
    flex: 1;
    font-size: 14px;
    line-height: 1.4;
    word-break: break-word;
    cursor: pointer;
  }
  .todo-item.done .todo-text {
    text-decoration: line-through;
    color: var(--done-text);
  }

  .todo-text-edit {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--accent);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    outline: none;
    padding: 1px 0;
  }

  .todo-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .icon-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 14px; padding: 3px 5px;
    border-radius: 5px; transition: color .15s, background .15s;
  }
  .icon-btn:hover { color: var(--text); background: var(--border); }
  .icon-btn.del:hover { color: var(--red); }

  .todo-meta {
    font-size: 11px; color: var(--muted); padding: 10px 20px 6px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
  }

  /* <chat-with-app> fills the right column */
  chat-with-app {
    flex-shrink: 0;
    border-left: 1px solid var(--border);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <h1>✦ Todo · Agent</h1>
  <span>LLM-powered task assistant</span>
</header>

<div class="layout">

  <!-- ── TODO PANEL ── -->
  <div class="todo-panel">
    <div class="todo-add">
      <input id="newTodoInput" type="text" placeholder="Add a new task…" />
      <button class="btn">Add</button>
    </div>
    <div id="todoList" class="todo-list"></div>
    <div class="todo-meta">
      <span id="todoCount">0 tasks</span>
      <button class="btn ghost" style="font-size:11px;padding:4px 10px">Clear done</button>
    </div>
  </div>

  <!-- ── CHAT PANEL ── -->
  <chat-with-app
    id="chatAgent"
    spec-url="/openapi.json"
    system-prompt="You are a helpful task management assistant. You have tools to list, add, update, and delete todos. Always call list_todos first when the user asks about their tasks. Be concise and friendly. Confirm what you did after using tools."
  ></chat-with-app>

</div>

<script type="module" src="/shared/chat-with-app.js"></script>
<script type="module">
// ── Todo UI ───────────────────────────────────────────────────────────────────
// The chat/agent logic now lives entirely in <chat-with-app>.
// This script handles only the todo panel and reacts to tool-executed events
// dispatched by the component so the list stays in sync.

let todoAPI = null;

// ── OpenAPI client (minimal — only what the todo panel needs) ─────────────────
async function buildTodoAPI(specUrl = '/openapi.json') {
  const spec = await fetch(specUrl).then(r => r.json());
  const api  = {};
  for (const [path, methods] of Object.entries(spec.paths ?? {})) {
    for (const [method, op] of Object.entries(methods)) {
      if (!op.operationId) continue;
      const pathParams = (path.match(/\{(\w+)\}/g) ?? []).map(p => p.slice(1, -1));
      api[op.operationId] = async (input = {}) => {
        let url = path;
        const body = { ...input };
        for (const p of pathParams) {
          url = url.replace(`{${p}}`, encodeURIComponent(body[p]));
          delete body[p];
        }
        const hasBody = ['post', 'patch', 'put'].includes(method);
        const res = await fetch(url, {
          method: method.toUpperCase(),
          headers: hasBody ? { 'Content-Type': 'application/json' } : {},
          body: hasBody && Object.keys(body).length ? JSON.stringify(body) : undefined,
        });
        if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.detail ?? `HTTP ${res.status}`); }
        return res.json();
      };
    }
  }
  return api;
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function loadTodos() {
  if (!todoAPI) return;
  const todos = await todoAPI.list_todos({});
  renderTodos(todos);
}

function renderTodos(todos) {
  const list  = document.getElementById('todoList');
  const count = document.getElementById('todoCount');
  count.textContent = `${todos.length} task${todos.length !== 1 ? 's' : ''}`;

  if (todos.length === 0) {
    list.innerHTML = `
      <div class="todo-empty">
        <div class="icon">&#x2713;</div>
        <div>No tasks yet &mdash; add one above or ask the agent.</div>
      </div>`;
    return;
  }

  list.innerHTML = todos.map(t => `
    <div class="todo-item${t.done ? ' done' : ''}" id="item-${t.id}" data-id="${t.id}" data-done="${t.done}">
      <input type="checkbox" ${t.done ? 'checked' : ''} data-action="toggle" />
      <span class="todo-text" data-action="edit">${escHtml(t.text)}</span>
      <div class="todo-actions">
        <button class="icon-btn" title="Edit" data-action="edit">&#x270E;</button>
        <button class="icon-btn del" title="Delete" data-action="delete">&#x2715;</button>
      </div>
    </div>`).join('');
}

// ── Interactions ──────────────────────────────────────────────────────────────
async function addTodo() {
  const inp  = document.getElementById('newTodoInput');
  const text = inp.value.trim();
  if (!text) return;
  await todoAPI.add_todo({ text });
  inp.value = '';
  inp.focus();
  await loadTodos();
}

async function clearDone() {
  await todoAPI.clear_done_todos({});
  await loadTodos();
}

function startEdit(id, currentText) {
  const row  = document.getElementById(`item-${id}`);
  const span = row.querySelector('.todo-text');
  const inp  = document.createElement('input');
  inp.className = 'todo-text-edit';
  inp.value = currentText;
  inp.addEventListener('blur', async () => {
    if (inp.value.trim()) await todoAPI.update_todo({ todo_id: id, text: inp.value });
    await loadTodos();
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter')  inp.blur();
    if (e.key === 'Escape') { inp.value = currentText; inp.blur(); }
  });
  span.replaceWith(inp);
  inp.focus();
}

document.getElementById('todoList').addEventListener('click', async e => {
  const row    = e.target.closest('[data-id]');
  if (!row) return;
  const id     = parseInt(row.dataset.id);
  const done   = row.dataset.done === 'true';
  const action = e.target.closest('[data-action]')?.dataset.action;
  const text   = row.querySelector('.todo-text')?.textContent ?? '';

  if      (action === 'toggle') { await todoAPI.update_todo({ todo_id: id, done: !done }); await loadTodos(); }
  else if (action === 'edit')   { startEdit(id, text); }
  else if (action === 'delete') { await todoAPI.delete_todo({ todo_id: id }); await loadTodos(); }
});

// ── Refresh todo list whenever the agent uses a tool ─────────────────────────
document.getElementById('chatAgent').addEventListener('tool-executed', () => loadTodos());

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById('newTodoInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });
document.querySelector('.todo-add .btn').addEventListener('click', addTodo);
document.querySelector('.todo-meta .btn').addEventListener('click', clearDone);

(async () => {
  todoAPI = await buildTodoAPI('/openapi.json');
  await loadTodos();
})();
</script>
</body>
</html>
